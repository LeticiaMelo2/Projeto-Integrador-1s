<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>estatisticas</title>
</head>
<body class="body-estatistica">
    <main class="container-estatistica">
    <h2>Status</h2>

        {% for item in estatisticas_status %}
        <p>{{ item.status }}: {{ item.total }}</p>
        {% endfor %}

    <h2>Prioridade</h2>

        {% for item in estatisticas_prioridade %}
        <p>{{ item.prioridade }}: {{ item.total }}</p>
        {% endfor %}
    </main>
</body>
</html>
