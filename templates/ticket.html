<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Reportar ocorrência</title>
</head>
<body class="body-ticket">

    <div class="alert-container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert-success">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
</div>

    <!--container principal-->
    <form method="POST" action="/criar_ocorrencia">

        <main class="container-ticket">

           <!--- <input type="checkbox" id="toggle-info" hidden> -->
            <h1 class="titulo-com-info">
                Reportar ocorrência
                <!--<label for="toggle-info" class="info-coin">?</label> -->
            </h1>
           
           <!--campos principais-->
            <div class="linha-form"> 

             <div class="input-assunto">
                <input name="titulo" placeholder="Assunto" required> 
            </div>

                <!--prioridade-->
                <div class="input-prioridade">  
                    <select name="impacto">
                        <option value="Impacto" disabled selected>Impacto</option>
                        <option value="Alta">Alta</option>
                        <option value="Média">Média</option>
                        <option value="Baixa">Baixa</option>
                    </select>
                </div>

                <div class="input-prioridade"> 

                    <select name="urgencia">
                        <option value="Uegência" disabled selected>Urgência</option>
                        <option value="Alta">Alta</option>
                        <option value="Média">Média</option>
                        <option value="Baixa">Baixa</option>
                    </select> 
                </div>
            </div>
                
            <!--descrição-->
            <div class="input-desc">
                <textarea name="descricao" placeholder="Descrição" required></textarea>
            </div>

            <button type="button" class="ocorrencia" onclick="mostrarMensagem()">
                Gerar ocorrência
            </button>

            <div id="mensagem-popup" class="mensagem-popup">
                Ocorrência criada com sucesso!
            </div>
        </form>
    </main>

    <script>
        function mostrarMensagem() {

            let popup = document.getElementById("mensagem-popup");

            popup.style.display = "block";

            setTimeout(() => {
                document.querySelector("form").submit();
            }, 1500);
        }
    </script>

</body>
</html>
